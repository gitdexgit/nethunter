# --- GLOBAL SEARCH (The one you wanted) ---
# all = "zk edit --notebook-dir /root/work --notebook-dir /home/root/archive_fossil --notebook-dir /home/root/wiki --interactive $@"

# --- Interactive Essentials ---
# Fixed 'a' and 'w' to use the notebook-dir flag so they work from anywhere
a = "zk edit --notebook-dir /root/archive_fossil --interactive $@"
w = "zk edit --notebook-dir /root/wiki --interactive $@"
c = "zk edit --notebook-dir /root/work --interactive current_struggles $@"
s = "zk edit --notebook-dir /root/work --interactive sources $@"

# --- Interactive based on folder ---
i = "zk edit --interactive $@"
ci = "zk edit --interactive current_struggles $@"
si = "zk edit --interactive sources $@"
ai = "zk edit --notebook-dir /root/archive_fossil --interactive $@"
wi = "zk edit --notebook-dir /root/wiki --interactive $@"

# --- Interactive based on last modified ---
m = "zk edit --interactive --sort modified"
cm = "zk edit --interactive current_struggles $@ --sort modified"
sm = "zk edit --interactive sources $@ --sort modified"
am = "zk edit --notebook-dir /root/archive_fossil --interactive --sort modified $@"
wm = "zk edit --notebook-dir /root/wiki --interactive --sort modified $@"

# --- Interactive based on tag ---
t = "zk edit --interactive --tag $@"
ct = "zk edit --interactive current_struggles --tag $@"
st = "zk edit --interactive sources --tag $@"
at = "zk edit --notebook-dir /root/archive_fossil --interactive --tag $@"
wt = "zk edit --notebook-dir /root/wiki --interactive --tag $@"


[lsp]
[lsp.diagnostics]
wiki-title = "hint"
dead-link = "error"
