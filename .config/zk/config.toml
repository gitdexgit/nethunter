[note]
language = "en"
default-title = ""
filename = "{{format-date now '%Y%m%d%H%M'}}"
extension = "md"
template = "/root/work/Attatchements/Templates/default.md"

# I tried this This works for the autosuggestion temporary `scratch.md` to remove sources but it screws the aliases bellow
# exclude = [
#     "sources",
#     "sources/**"
# ]

[format.markdown]
wiki-links = true
hashtags = true
colon-tags = true

[tool]
editor = "nvim"
fzf-preview = "bat -p --color always {-1}"
fzf-options = "--layout=default --preview-window='up:65%:wrap' --bind 'alt-w:toggle-wrap,alt-j:preview-page-down,alt-k:preview-page-up,alt-J:preview-down,alt-K:preview-up'"

[alias]

# 1. Search everything
all = "(zk --notebook-dir /root/work list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}}') | fzf --preview 'bat -p --color always {}' | xargs -r zk edit"

# 2. Search everything - Sorted by Last Modified (Newest first)
allm = "(zk --notebook-dir /root/work list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}}') | xargs ls -t | fzf --preview 'bat -p --color always {}' | xargs -r zk edit"

# 3. Search everything - Including Tags in the search
# This doesn't work well, I need to like filter everything by tag
# allt = "(zk --notebook-dir /root/work list -q --format '{{abs-path}} {{tags}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}} {{tags}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}} {{tags}}') | fzf --preview 'bat -p --color always {1}' | awk '{print $1}' | xargs -r zk edit"


ls = "(zk --notebook-dir /root/work list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}}') | fzf --preview 'bat -p --color always {}' | xargs -r zk edit"
l = "(zk --notebook-dir /root/work list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}}') | fzf --preview 'bat -p --color always {}' | xargs -r zk edit"
lm = "(zk --notebook-dir /root/work list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}}') | xargs ls -t | fzf --preview 'bat -p --color always {}' | xargs -r zk edit"
# these don't work yet
