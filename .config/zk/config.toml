# tag = "(zk --notebook-dir /root/work list -q --format '{{abs-path}} {{tags}}'; zk --notebook-dir /home/root/archive_fossil list -q --format '{{abs-path}} {{tags}}'; zk --notebook-dir /home/root/wiki list -q --format '{{abs-path}} {{tags}}') | fzf --preview 'bat -p --color always {1}' | awk '{print $1}' | xargs -r zk edit"


